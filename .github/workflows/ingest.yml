name: F1 Bulletin Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      skip_intelligence:
        description: 'Skip intelligence + sync steps'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      ingest_only:
        description: 'Run ingest only'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_WAREHOUSE: F1_APP_WH
  SNOWFLAKE_DATABASE: F1_BULLETIN
  SNOWFLAKE_ROLE: SYSADMIN

jobs:

# ----------------------------------------------------
# RSS INGEST
# ----------------------------------------------------

  ingest:
    name: Ingest RSS to Snowflake
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser \
            requests \
            snowflake-connector-python \
            python-dotenv

      - name: Run RSS ingestion
        run: |
          python3 scripts/ingest_rss.py

      - name: Summary
        if: always()
        run: echo "RSS ingest completed with status ${{ job.status }}"


# ----------------------------------------------------
# PHASE 1 INTELLIGENCE
# ----------------------------------------------------

  phase1_intelligence:
    name: Phase 1 Intelligence
    runs-on: ubuntu-latest
    needs: ingest

    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 1 SQL
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_pipeline.sql

      - name: Sync core content to Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 scripts/core_content_sync.py

      - name: Sync Phase 1 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 scripts/intelligence_sync.py


# ----------------------------------------------------
# SEMANTIC CLUSTERING
# ----------------------------------------------------

  semantic_clustering:
    name: Semantic Clustering
    runs-on: ubuntu-latest
    needs: phase1_intelligence

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python

      - name: Run clustering SQL
        run: |
          python3 scripts/run_sql_file.py sql/semantic_clustering.sql


# ----------------------------------------------------
# PHASE 2 INTELLIGENCE
# ----------------------------------------------------

  phase2_intelligence:
    name: Phase 2 Intelligence
    runs-on: ubuntu-latest
    needs: semantic_clustering

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 2 SQL
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_phase2_completion.sql

      - name: Sync Phase 2 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 scripts/intelligence_sync_phase2.py


# ----------------------------------------------------
# PHASE 3 INTELLIGENCE
# ----------------------------------------------------

  phase3_intelligence:
    name: Phase 3 Intelligence
    runs-on: ubuntu-latest
    needs: phase2_intelligence

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 3 SQL
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_phase3.sql

      - name: Sync Phase 3 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 scripts/intelligence_sync_phase3.py

      - name: Pipeline Summary
        if: always()
        run: echo "Intelligence pipeline completed with status ${{ job.status }}"
