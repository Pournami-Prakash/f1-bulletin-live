# .github/workflows/ingest.yml
#
# Scheduled RSS ingestion for F1 Bulletin.
# Runs every 15 minutes. Calls /api/ingest/rss twice per run:
#   1) Official feeds first (FIA press releases, FIA news)
#   2) Media + Reddit feeds
# Both with html=1 to fetch full article text.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   APP_URL     — e.g. https://f1-bulletin.vercel.app  (no trailing slash)
#   INGEST_KEY  — must match INGEST_KEY env var in Vercel

name: Ingest RSS

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      tier:
        description: "Feed tier to ingest (all | official | media)"
        required: false
        default: "all"
      html:
        description: "Fetch full HTML? (1 = yes, 0 = no)"
        required: false
        default: "1"

jobs:
  ingest:
    name: Ingest feeds
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Ingest official feeds
        # FIA press releases + FIA news — small, fast, high priority
        run: |
          TIER="${{ github.event.inputs.tier || 'official' }}"
          HTML="${{ github.event.inputs.html || '1' }}"

          # Only run official step on scheduled runs (not when manual tier != official/all)
          if [[ "$TIER" != "official" && "$TIER" != "all" ]]; then
            echo "Skipping official step (tier=$TIER)"
            exit 0
          fi

          echo "Ingesting official feeds (html=$HTML)..."
          RESPONSE=$(curl --silent --show-error --fail \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_KEY }}" \
            "${{ secrets.APP_URL }}/api/ingest/rss?html=$HTML&tier=official")

          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('ok'):
              print('ERROR:', d.get('error', 'unknown'))
              sys.exit(1)
          print(f\"Official: attempted={d.get('attempted',0)} inserted={d.get('inserted',0)} skipped={d.get('skipped',0)}\")
          per = d.get('perFeed', {})
          for feed, stats in per.items():
              print(f\"  {feed}: fetched={stats.get('fetched',0)} inserted={stats.get('inserted',0)} err={stats.get('error','')}\")
          "

      - name: Ingest media feeds
        # BBC, Motorsport.com, RaceFans, Reddit — larger, slower
        run: |
          TIER="${{ github.event.inputs.tier || 'media' }}"
          HTML="${{ github.event.inputs.html || '1' }}"

          if [[ "$TIER" != "media" && "$TIER" != "all" ]]; then
            echo "Skipping media step (tier=$TIER)"
            exit 0
          fi

          echo "Ingesting media feeds (html=$HTML)..."
          RESPONSE=$(curl --silent --show-error --fail \
            --max-time 240 \
            --retry 2 \
            --retry-delay 10 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_KEY }}" \
            "${{ secrets.APP_URL }}/api/ingest/rss?html=$HTML&tier=media")

          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if not d.get('ok'):
              print('ERROR:', d.get('error', 'unknown'))
              sys.exit(1)
          print(f\"Media: attempted={d.get('attempted',0)} inserted={d.get('inserted',0)} skipped={d.get('skipped',0)}\")
          per = d.get('perFeed', {})
          for feed, stats in per.items():
              print(f\"  {feed}: fetched={stats.get('fetched',0)} inserted={stats.get('inserted',0)} err={stats.get('error','')}\")
          "

      - name: Summary
        if: always()
        run: echo "Ingest run complete at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
