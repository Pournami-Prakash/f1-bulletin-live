name: F1 Bulletin Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      skip_intelligence:
        description: 'Skip intelligence + sync steps'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      ingest_only:
        description: 'Run ingest only'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  SNOWFLAKE_WAREHOUSE: F1_APP_WH
  SNOWFLAKE_DATABASE: F1_BULLETIN
  SNOWFLAKE_ROLE: SYSADMIN
  # Use the canonical deployment directly. A redirecting APP_URL previously
  # returned "Redirecting..." with a successful status without running POST.
  APP_BASE_URL: https://f1bulletin.vercel.app

jobs:

# ----------------------------------------------------
# RSS INGEST
# ----------------------------------------------------

  ingest:
    name: Ingest RSS to Neon
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      snowflake_available: ${{ steps.snowflake-check.outputs.available }}

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Probe Snowflake availability
        id: snowflake-check
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          if [ -n "$SNOWFLAKE_ACCOUNT" ] && [ -n "$SNOWFLAKE_USER" ] && [ -n "$SNOWFLAKE_PASSWORD" ]; then
            python3 -m pip install --quiet snowflake-connector-python
            if python3 -c "import os, snowflake.connector as sf; conn = sf.connect(account=os.environ['SNOWFLAKE_ACCOUNT'], user=os.environ['SNOWFLAKE_USER'], password=os.environ['SNOWFLAKE_PASSWORD'], warehouse=os.environ.get('SNOWFLAKE_WAREHOUSE', 'F1_APP_WH'), database=os.environ.get('SNOWFLAKE_DATABASE', 'F1_BULLETIN'), role=os.environ.get('SNOWFLAKE_ROLE', 'SYSADMIN'), login_timeout=20, network_timeout=20); cur = conn.cursor(); cur.execute('SELECT 1'); cur.close(); conn.close()"; then
              echo "available=true" >> "$GITHUB_OUTPUT"
            else
              echo "Snowflake unavailable, enrichment will be skipped"
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Neon RSS ingestion
        env:
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
        run: |
          test -n "$INGEST_KEY"
          curl --silent --show-error --fail-with-body --retry 2 --retry-delay 5 \
            -X POST \
            -H "Authorization: Bearer $INGEST_KEY" \
            "$APP_BASE_URL/api/ingest/rss?tier=all" \
            -o /tmp/rss-ingest-response.json
          jq -e '.ok == true' /tmp/rss-ingest-response.json
          jq '{ok, attempted: .data.attempted, inserted: .data.inserted, updated: .data.updated}' \
            /tmp/rss-ingest-response.json

      - name: Refresh Neon intelligence
        env:
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
        run: |
          test -n "$INGEST_KEY"
          curl --silent --show-error --fail-with-body --retry 2 --retry-delay 5 \
            -X POST \
            -H "Authorization: Bearer $INGEST_KEY" \
            "$APP_BASE_URL/api/intelligence/refresh" \
            -o /tmp/intelligence-response.json
          jq -e '.ok == true' /tmp/intelligence-response.json
          jq '{ok, articlesProcessed: .data.articlesProcessed, clustersSummarized: .data.clustersSummarized, driversUpdated: .data.driversUpdated}' \
            /tmp/intelligence-response.json

      - name: Summary
        if: always()
        run: echo "Neon RSS ingest completed with status ${{ job.status }}"


# ----------------------------------------------------
# NEON-NATIVE INTELLIGENCE (SNOWFLAKE-INDEPENDENT)
# ----------------------------------------------------

  neon_intelligence:
    name: Neon-native Intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ingest
    if: github.event.inputs.skip_intelligence != 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-neon-intelligence.txt

      - name: Cache local embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1-${{ runner.os }}

      - name: Install local intelligence dependencies
        run: pip install --quiet -r scripts/requirements-neon-intelligence.txt

      - name: Refresh Neon-native intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          FASTEMBED_CACHE_PATH: ~/.cache/fastembed
        run: python3 scripts/neon_intelligence_v2.py --max-articles 500


# ----------------------------------------------------
# PHASE 1 INTELLIGENCE
# ----------------------------------------------------

  phase1_intelligence:
    name: Phase 1 Intelligence
    runs-on: ubuntu-latest
    needs: ingest

    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true' &&
      needs.ingest.outputs.snowflake_available == 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 1 SQL
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_pipeline.sql

      - name: Sync core content to Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/core_content_sync.py

      - name: Sync Phase 1 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/intelligence_sync.py


# ----------------------------------------------------
# SEMANTIC CLUSTERING
# ----------------------------------------------------

  semantic_clustering:
    name: Semantic Clustering
    runs-on: ubuntu-latest
    needs: [ingest, phase1_intelligence]
    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true' &&
      needs.ingest.outputs.snowflake_available == 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python

      - name: Run clustering SQL
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/run_sql_file.py sql/semantic_clustering.sql


# ----------------------------------------------------
# PHASE 2 INTELLIGENCE
# ----------------------------------------------------

  phase2_intelligence:
    name: Phase 2 Intelligence
    runs-on: ubuntu-latest
    needs: [ingest, semantic_clustering]
    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true' &&
      needs.ingest.outputs.snowflake_available == 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 2 SQL
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_phase2_completion.sql

      - name: Sync Phase 2 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/intelligence_sync_phase2.py


# ----------------------------------------------------
# PHASE 3 INTELLIGENCE
# ----------------------------------------------------

  phase3_intelligence:
    name: Phase 3 Intelligence
    runs-on: ubuntu-latest
    needs: [ingest, phase2_intelligence]
    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true' &&
      needs.ingest.outputs.snowflake_available == 'true'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 3 SQL
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/run_sql_file.py sql/intelligence_phase3.sql

      - name: Sync Phase 3 intelligence
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 scripts/intelligence_sync_phase3.py

      - name: Pipeline Summary
        if: always()
        run: echo "Intelligence pipeline completed with status ${{ job.status }}"
