name: F1 Bulletin Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      skip_intelligence:
        description: 'Skip intelligence + sync steps'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      ingest_only:
        description: 'Run ingest only'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  ingest:
    name: Ingest RSS to Snowflake
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ingest dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser \
            requests \
            snowflake-connector-python \
            python-dotenv

      - name: Run RSS ingestion
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: F1_APP_WH
          SNOWFLAKE_DATABASE: F1_BULLETIN
          SNOWFLAKE_ROLE: SYSADMIN
        run: |
          python3 ingest_rss.py

      - name: Summary
        if: always()
        run: echo "Ingest job completed with status ${{ job.status }}"

  intelligence:
    name: Intelligence Pipeline
    runs-on: ubuntu-latest
    needs: ingest
    timeout-minutes: 20
    if: |
      github.event.inputs.ingest_only != 'true' &&
      github.event.inputs.skip_intelligence != 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            snowflake-connector-python \
            psycopg2-binary \
            python-dotenv

      - name: Run Phase 1 intelligence SQL
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os
          import sys
          import time
          import snowflake.connector

          def execute_sql_file(path: str, label: str):
              conn = snowflake.connector.connect(
                  account=os.environ['SNOWFLAKE_ACCOUNT'],
                  user=os.environ['SNOWFLAKE_USER'],
                  password=os.environ['SNOWFLAKE_PASSWORD'],
                  warehouse='F1_APP_WH',
                  database='F1_BULLETIN',
                  schema='MART',
                  login_timeout=30,
              )

              with open(path, 'r', encoding='utf-8') as f:
                  full_sql = f.read()

              statements = []
              for s in full_sql.split(';'):
                  lines = [l for l in s.split('\n') if not l.strip().startswith('--')]
                  stmt = '\n'.join(lines).strip()
                  if stmt:
                      statements.append(stmt)

              print(f"Running {len(statements)} {label} statements...")
              cur = conn.cursor()
              errors = []

              for i, stmt in enumerate(statements):
                  preview = stmt[:80].replace('\n', ' ')
                  try:
                      t0 = time.time()
                      cur.execute(stmt)
                      print(f"  [{i+1:02d}] OK  {preview}... ({cur.rowcount} rows, {time.time()-t0:.1f}s)")
                  except snowflake.connector.errors.ProgrammingError as e:
                      err_str = str(e)
                      if any(x in err_str for x in ['Nothing to insert', 'already exists']):
                          print(f"  [{i+1:02d}] SKIP {preview}")
                      else:
                          print(f"  [{i+1:02d}] ERR  {err_str}")
                          errors.append(err_str)

              cur.close()
              conn.close()

              print(f"{label} done. {len(errors)} errors.")
              if errors:
                  sys.exit(1)

          execute_sql_file('./web/src/sql/intelligence_pipeline.sql', 'Phase 1 SQL')
          PYEOF

      - name: Sync core content to Neon
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 ./web/src/scripts/core_content_sync.py

      - name: Sync Phase 1 intelligence to Neon
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          python3 ./web/src/scripts/intelligence_sync.py

      - name: Run semantic clustering SQL
